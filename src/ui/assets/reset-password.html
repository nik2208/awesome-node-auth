<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Awesome Node Auth</title>
    <link rel="stylesheet" href="base.css">
</head>

<body>
    <div class="auth-container">
        <img src="" alt="Logo" class="logo hidden">
        <h1 class="site-name" data-i18n="site_name">Awesome Node Auth</h1>
        <h2 data-i18n="reset_password_title">Set New Password</h2>

        <div id="alert" class="alert hidden"></div>

        <form id="reset-form">
            <div class="form-group">
                <label for="password" data-i18n="new_password_label">New Password</label>
                <input type="password" id="password" name="password" required data-i18n="new_password_placeholder">
            </div>
            <div class="form-group">
                <label for="confirmPassword" data-i18n="confirm_password_label">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required data-i18n="confirm_password_placeholder">
            </div>
            <button type="submit" id="submit-btn" data-i18n="save_password_button">Save New Password</button>
        </form>

        <div id="success-message" class="hidden">
            <div class="alert alert-success" data-i18n="reset_password_success">
                Your password has been successfully reset.
            </div>
            <p class="footer-links">
                <a href="login" data-i18n="proceed_to_login_link">Proceed to login</a>
            </p>
        </div>
    </div>

    <script src="auth.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await AuthService.init();

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const form = document.getElementById('reset-form');
            const alert = document.getElementById('alert');
            const submitBtn = document.getElementById('submit-btn');
            const successContainer = document.getElementById('success-message');

            if (!token) {
                alert.textContent = 'Invalid or missing reset token.';
                alert.classList.add('alert-error');
                alert.classList.remove('hidden');
                form.classList.add('hidden');
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                alert.className = 'alert hidden';

                if (form.password.value !== form.confirmPassword.value) {
                    alert.textContent = 'Passwords do not match';
                    alert.classList.add('alert-error');
                    alert.classList.remove('hidden');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Saving...';

                try {
                    const result = await AuthService.apiCall('/reset-password', 'POST', {
                        password: form.password.value,
                        token
                    });

                    if (result.success) {
                        form.classList.add('hidden');
                        successContainer.classList.remove('hidden');
                    } else {
                        alert.textContent = result.error || 'Failed to reset password';
                        alert.classList.add('alert-error');
                        alert.classList.remove('hidden');
                    }
                } catch (err) {
                    alert.textContent = 'An unexpected error occurred';
                    alert.classList.add('alert-error');
                    alert.classList.remove('hidden');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Save New Password';
                }
            });
        });
    </script>
</body>

</html>
