<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Awesome Node Auth</title>
    <link rel="stylesheet" href="base.css">
</head>

<body>
    <div class="auth-container">
        <img src="" alt="Logo" class="logo hidden">
        <h1 class="site-name" data-i18n="site_name">Awesome Node Auth</h1>
        <h2 data-i18n="verify_email_title">Email Verification</h2>

        <div id="alert" class="alert hidden"></div>

        <div id="loading" class="footer-links" data-i18n="verify_email_loading">
            Verifying your email address, please wait...
        </div>

        <div class="footer-links">
            <a href="login" data-i18n="go_to_login_link">Go to login</a>
        </div>
    </div>

    <script src="auth.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await AuthService.init();

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const alert = document.getElementById('alert');
            const loading = document.getElementById('loading');

            if (!token) {
                alert.textContent = 'Invalid or missing verification token.';
                alert.className = 'alert alert-error';
                loading.classList.add('hidden');
                return;
            }

            try {
                // GET /auth/verify-email?token=...
                const result = await AuthService.apiCall(`/verify-email?token=${token}`, 'GET');

                loading.classList.add('hidden');
                if (result.success) {
                    alert.textContent = 'Your email has been successfully verified!';
                    alert.className = 'alert alert-success';
                } else {
                    alert.textContent = result.error || 'Verification failed';
                    alert.className = 'alert alert-error';
                }
            } catch (err) {
                loading.classList.add('hidden');
                alert.textContent = 'An unexpected error occurred';
                alert.className = 'alert alert-error';
            }
        });
    </script>
</body>

</html>
