<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Awesome Node Auth</title>
    <link rel="stylesheet" href="base.css">
</head>

<body>
    <div class="auth-container">
        <img src="" alt="Logo" class="logo hidden">
        <h1 class="site-name">Awesome Node Auth</h1>
        <h2>Reset Password</h2>

        <div id="alert" class="alert hidden"></div>

        <div id="request-form-container">
            <p class="footer-links" style="margin-bottom: 20px; text-align: left;">
                Enter your email address and we'll send you a link to reset your password.
            </p>
            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" id="submit-btn">Send Reset Link</button>
            </form>
        </div>

        <div id="success-message" class="hidden">
            <div class="alert alert-success">
                If an account exists for <strong id="sent-email"></strong>, you will receive a password reset link
                shortly.
            </div>
            <p class="footer-links">
                <a href="login">Return to login</a>
            </p>
        </div>

        <div class="footer-links" id="login-link">
            <p>Remember your password? <a href="login">Login</a></p>
        </div>
    </div>

    <script src="auth.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await AuthService.init();

            const form = document.getElementById('forgot-form');
            const alert = document.getElementById('alert');
            const submitBtn = document.getElementById('submit-btn');
            const requestContainer = document.getElementById('request-form-container');
            const successContainer = document.getElementById('success-message');
            const loginLink = document.getElementById('login-link');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                alert.className = 'alert hidden';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';

                const email = form.email.value;

                try {
                    const result = await AuthService.apiCall('/forgot-password', 'POST', { email });

                    if (result.success) {
                        document.getElementById('sent-email').textContent = email;
                        requestContainer.classList.add('hidden');
                        loginLink.classList.add('hidden');
                        successContainer.classList.remove('hidden');
                    } else {
                        alert.textContent = result.error || 'Request failed';
                        alert.classList.add('alert-error');
                        alert.classList.remove('hidden');
                    }
                } catch (err) {
                    alert.textContent = 'An unexpected error occurred';
                    alert.classList.add('alert-error');
                    alert.classList.remove('hidden');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Reset Link';
                }
            });
        });
    </script>
</body>

</html>
